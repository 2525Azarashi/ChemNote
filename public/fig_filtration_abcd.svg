<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="ろ過の操作 ア〜エ">
  <style>
    .panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.line{stroke:#334155;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}.thin{stroke:#64748b;stroke-width:2;fill:none}.water{fill:#bfdbfe;stroke:#60a5fa;stroke-width:2}.label{font:700 26px sans-serif;fill:#1e293b}.small{font:600 15px sans-serif;fill:#475569}.paper{fill:#f8fafc;stroke:#475569;stroke-width:3}.glass{fill:#eff6ff;stroke:#475569;stroke-width:3;opacity:.75}
  </style>
  <rect width="900" height="260" fill="#f8fafc"/>
  <g transform="translate(20 20)">
