    <path class="line" d="M48 80h70l-28 48v68H78v-68z"/><path class="paper" d="M59 91h48l-24 34z"/>
    <path class="line" d="M126 74l34 18"/><path class="thin" d="M142 80l-20 38"/><path class="glass" d="M114 152h60l-8 44h-44z"/><path class="water" d="M122 174h44v17h-48z"/>
